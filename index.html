<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tour Guides — Coming Soon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=DM+Sans:wght@300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      background: #F5F0E8;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Sans', sans-serif;
    }

    .wrap {
      text-align: center;
      opacity: 0;
      animation: up 1.4s cubic-bezier(0.16, 1, 0.3, 1) 0.2s forwards;
    }

    @keyframes up {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(48px, 10vw, 96px);
      font-weight: 300;
      letter-spacing: -0.01em;
      color: #1A1814;
      line-height: 1;
      margin-bottom: 20px;
    }

    h1 em {
      font-style: italic;
      color: #C8A96E;
    }

    p {
      font-size: 13px;
      font-weight: 300;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #9A9287;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Tour <em>Guides</em></h1>
    <p>Coming Soon</p>
  </div>
</body>
</html>
